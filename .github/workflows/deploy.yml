name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_INTAKE_PIN: ${{ secrets.VITE_INTAKE_PIN || vars.VITE_INTAKE_PIN }}
          VITE_GITHUB_TOKEN: ${{ secrets.VITE_GITHUB_TOKEN || vars.VITE_GITHUB_TOKEN }}
          VITE_GITHUB_REPO: ${{ secrets.VITE_GITHUB_REPO || vars.VITE_GITHUB_REPO }}
          VITE_GITHUB_FILE_PATH: ${{ secrets.VITE_GITHUB_FILE_PATH || vars.VITE_GITHUB_FILE_PATH }}
          VITE_GITHUB_BRANCH: ${{ secrets.VITE_GITHUB_BRANCH || vars.VITE_GITHUB_BRANCH }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY || vars.VITE_GEMINI_API_KEY }}

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
